<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>随机刷题工具</title>
  <script src="xlsx.min.js"></script>
  <style>
    :root {
      --ink: #17211b;
      --muted: #68736c;
      --paper: #fffdf7;
      --panel: #f7f1e4;
      --line: #ded3bd;
      --accent: #1f7a5a;
      --accent-2: #d86f32;
      --ok: #1e8f5a;
      --bad: #b33f32;
      --shadow: 0 18px 44px rgba(42, 32, 18, .14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 12%, rgba(216, 111, 50, .12), transparent 28rem),
        radial-gradient(circle at 82% 18%, rgba(31, 122, 90, .14), transparent 26rem),
        linear-gradient(135deg, #fbf6ea 0%, #eef4ec 100%);
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      display: grid;
      place-items: center;
      padding: 28px 14px;
    }

    .phone {
      width: min(430px, 100%);
      min-height: 760px;
      background: var(--paper);
      border: 1px solid rgba(23, 33, 27, .14);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .topbar {
      padding: 18px 20px 14px;
      background: #183226;
      color: #fffaf0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .brand strong {
      font-size: 20px;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .brand span {
      color: rgba(255, 250, 240, .72);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .pill {
      flex: 0 0 auto;
      border: 1px solid rgba(255, 250, 240, .25);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      color: #fffaf0;
      background: rgba(255, 255, 255, .08);
    }

    main { padding: 18px; }

    .upload {
      border: 1.5px dashed #b7aa91;
      border-radius: 8px;
      background: #fcf8ef;
      padding: 18px;
      display: grid;
      gap: 12px;
    }

    .upload h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.25;
      font-weight: 800;
    }

    .upload p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .file-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    input[type="file"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fff;
      color: var(--muted);
      font-size: 12px;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 11px 14px;
      color: #fffaf0;
      background: var(--accent);
      font-weight: 750;
      cursor: pointer;
      transition: transform .15s ease, filter .15s ease, background .15s ease;
      min-height: 42px;
    }

    button:hover { transform: translateY(-1px); filter: brightness(1.03); }
    button:disabled { opacity: .45; cursor: not-allowed; transform: none; }

    .secondary {
      background: #2f3f35;
    }

    .danger {
      background: #9f3c32;
    }

    .ghost {
      background: transparent;
      color: var(--ink);
      border: 1px solid var(--line);
    }

    .memory-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 4px;
    }

    .saved-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fff;
      color: var(--ink);
      font-size: 13px;
      min-height: 42px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 16px 0;
    }

    .stat {
      border: 1px solid var(--line);
      background: #fffaf1;
      border-radius: 8px;
      padding: 10px;
    }

    .stat b {
      display: block;
      font-size: 18px;
      margin-bottom: 2px;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
    }

    .quiz-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffaf1;
      overflow: hidden;
    }

    .question-head {
      padding: 15px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .tag {
      border-radius: 999px;
      padding: 5px 9px;
      background: rgba(31, 122, 90, .11);
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .question {
      margin: 0;
      font-size: 18px;
      line-height: 1.55;
      font-weight: 760;
      word-break: break-word;
    }

    .options {
      display: grid;
      gap: 9px;
      padding: 14px;
    }

    .option {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      display: grid;
      grid-template-columns: 32px 1fr;
      gap: 9px;
      align-items: center;
      padding: 9px 11px;
      text-align: left;
    }

    .option .letter {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: #efe6d4;
      color: #594f40;
      font-weight: 850;
    }

    .option.selected {
      border-color: var(--accent);
      background: rgba(31, 122, 90, .08);
    }

    .option.correct {
      border-color: rgba(30, 143, 90, .75);
      background: rgba(30, 143, 90, .12);
    }

    .option.wrong {
      border-color: rgba(179, 63, 50, .72);
      background: rgba(179, 63, 50, .1);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 0 14px 14px;
    }

    .feedback {
      margin: 0 14px 14px;
      padding: 12px;
      border-radius: 8px;
      background: #f4ead8;
      color: var(--ink);
      line-height: 1.45;
      font-size: 14px;
      display: none;
    }

    .feedback.show { display: block; }
    .feedback b { color: var(--accent-2); }

    .sample {
      margin-top: 16px;
      border-top: 1px solid var(--line);
      padding-top: 13px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .sample code {
      color: var(--ink);
      background: #efe6d4;
      border-radius: 5px;
      padding: 2px 5px;
    }

    .hidden { display: none; }

    @media (max-width: 390px) {
      body { padding: 0; place-items: stretch; }
      .phone { min-height: 100vh; border-radius: 0; width: 100%; }
      .file-row, .saved-row, .actions, .memory-actions { grid-template-columns: 1fr; }
      .stats { grid-template-columns: 1fr 1fr 1fr; }
      .question { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="phone">
    <header class="topbar">
      <div class="brand">
        <strong>随机刷题</strong>
        <span id="sheetName">导入 Excel 后自动识别</span>
      </div>
      <div class="pill" id="statusPill">未导入</div>
    </header>

    <main>
      <section class="upload">
        <h1>导入题库，立即随机练习</h1>
        <p>支持 .xlsx、.xls、.csv。会自动寻找题目、答案、题型和 A/B/C/D 等选项列；没有题型列时，会根据答案格式判断单选或多选。</p>
        <div class="file-row">
          <input id="fileInput" type="file" accept=".xlsx,.xls,.csv" />
          <button id="loadSample" class="secondary">试用示例</button>
        </div>
        <div class="saved-row">
          <select id="savedLibrarySelect">
            <option value="">暂无已保存题库</option>
          </select>
          <button id="loadSavedBtn" class="secondary" disabled>打开题库</button>
        </div>
        <div class="memory-actions">
          <button id="wrongModeBtn" class="ghost" disabled>只刷错题</button>
          <button id="restartBtn" class="danger" disabled>重新开始</button>
        </div>
      </section>

      <section class="stats">
        <div class="stat"><b id="totalCount">0</b><span>题目</span></div>
        <div class="stat"><b id="doneCount">0</b><span>已答</span></div>
        <div class="stat"><b id="rightCount">0</b><span>正确</span></div>
      </section>

      <section id="quizCard" class="quiz-card hidden">
        <div class="question-head">
          <p class="question" id="questionText"></p>
          <span class="tag" id="typeTag">单选题</span>
        </div>
        <div class="options" id="options"></div>
        <p class="feedback" id="feedback"></p>
        <div class="actions">
          <button id="submitBtn">提交答案</button>
          <button id="nextBtn" class="ghost">随机下一题</button>
        </div>
      </section>

      <div class="sample">
        题库和进度会保存在当前浏览器。推荐表头：<code>题目</code>、<code>A</code>、<code>B</code>、<code>C</code>、<code>D</code>、<code>答案</code>、<code>题型</code>。选项列也支持 <code>选项A</code>、<code>optionA</code>、<code>选项1</code>。答案可写 <code>A</code>、<code>AB</code>、<code>A,B</code> 或选项文字。
      </div>
    </main>
  </div>

  <script>
    const LETTERS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
    const STORAGE_KEY = "quiz-tool-progress-v2";
    const DB_NAME = "quiz-tool-db";
    const DB_VERSION = 2;
    const STORE_NAME = "progress";
    const LIBRARY_STORE = "libraries";
    const state = {
      questions: [],
      current: null,
      selected: new Set(),
      answered: false,
      done: 0,
      right: 0,
      sheetName: "",
      signature: "",
      queue: [],
      cursor: 0,
      wrongIds: [],
      mode: "all"
    };

    const els = {
      fileInput: document.getElementById("fileInput"),
      loadSample: document.getElementById("loadSample"),
      savedLibrarySelect: document.getElementById("savedLibrarySelect"),
      loadSavedBtn: document.getElementById("loadSavedBtn"),
      wrongModeBtn: document.getElementById("wrongModeBtn"),
      restartBtn: document.getElementById("restartBtn"),
      sheetName: document.getElementById("sheetName"),
      statusPill: document.getElementById("statusPill"),
      totalCount: document.getElementById("totalCount"),
      doneCount: document.getElementById("doneCount"),
      rightCount: document.getElementById("rightCount"),
      quizCard: document.getElementById("quizCard"),
      questionText: document.getElementById("questionText"),
      typeTag: document.getElementById("typeTag"),
      options: document.getElementById("options"),
      feedback: document.getElementById("feedback"),
      submitBtn: document.getElementById("submitBtn"),
      nextBtn: document.getElementById("nextBtn")
    };

    const normalizeKey = value => String(value || "")
      .trim()
      .toLowerCase()
      .replace(/\s+/g, "")
      .replace(/[：:（）()_\-]/g, "");

    function findColumn(headers, candidates) {
      const normalized = headers.map(h => ({ raw: h, key: normalizeKey(h) }));
      for (const candidate of candidates) {
        const key = normalizeKey(candidate);
        const exact = normalized.find(h => h.key === key);
        if (exact) return exact.raw;
      }
      for (const candidate of candidates) {
        const key = normalizeKey(candidate);
        const fuzzy = normalized.find(h => h.key.includes(key) || key.includes(h.key));
        if (fuzzy) return fuzzy.raw;
      }
      return null;
    }

    function normalizeOptionKey(value) {
      return String(value || "")
        .trim()
        .toLowerCase()
        .replace(/\s+/g, "")
        .replace(/[：:（）()_\-\.\、,，。]/g, "");
    }

    function findOptionColumn(headers, letter, index, excludedColumns) {
      const optionNumber = String(index + 1);
      const keys = new Set([
        letter.toLowerCase(),
        `选项${letter}`.toLowerCase(),
        `${letter}选项`.toLowerCase(),
        `option${letter}`.toLowerCase(),
        `choice${letter}`.toLowerCase(),
        optionNumber,
        `选项${optionNumber}`,
        `option${optionNumber}`,
        `choice${optionNumber}`
      ].map(normalizeOptionKey));

      return headers.find(header => {
        if (excludedColumns.has(header)) return false;
        return keys.has(normalizeOptionKey(header));
      }) || null;
    }

    function detectOptionColumns(headers, excludedColumns) {
      const optionCols = [];
      for (const [index, letter] of LETTERS.entries()) {
        const found = findOptionColumn(headers, letter, index, excludedColumns);
        if (found) optionCols.push({ letter, column: found });
      }
      return optionCols;
    }

    function splitInlineOptions(text) {
      const source = String(text || "");
      const matches = [...source.matchAll(/(?:^|\n|\s)([A-H])[\.\、:：]\s*([^\n]+?)(?=(?:\n|\s)[A-H][\.\、:：]|\s*$)/g)];
      return matches.map(match => ({ letter: match[1], text: match[2].trim() })).filter(item => item.text);
    }

    function cleanQuestionText(text) {
      return String(text || "")
        .replace(/(?:^|\n|\s)[A-H][\.\、:：]\s*[^\n]+?(?=(?:\n|\s)[A-H][\.\、:：]|\s*$)/g, "")
        .trim();
    }

    function parseAnswer(rawAnswer, options) {
      const text = String(rawAnswer || "").trim();
      const compact = text.toUpperCase().replace(/[\s,，;；、|/]+/g, "");
      let letters = [];

      if (/^[A-Z]+$/.test(compact)) {
        letters = compact.split("").filter(letter => options.some(option => option.letter === letter));
      }

      if (!letters.length) {
        letters = options
          .filter(option => text.includes(option.text) || option.text.includes(text))
          .map(option => option.letter);
      }

      return [...new Set(letters)];
    }

    function detectType(typeText, answerLetters) {
      const value = normalizeKey(typeText);
      if (value.includes("多") || value.includes("multiple")) return "multiple";
      if (value.includes("单") || value.includes("single")) return "single";
      return answerLetters.length > 1 ? "multiple" : "single";
    }

    function buildQuestions(rows) {
      if (!rows.length) return [];
      const headers = Object.keys(rows[0]);
      const questionCol = findColumn(headers, ["题目", "题干", "问题", "试题", "question", "title", "stem"]);
      const answerCol = findColumn(headers, ["答案", "正确答案", "参考答案", "answer", "correct", "key"]);
      const typeCol = findColumn(headers, ["题型", "类型", "题目类型", "type", "kind"]);
      const excludedColumns = new Set([questionCol, answerCol, typeCol].filter(Boolean));
      const optionCols = detectOptionColumns(headers, excludedColumns);

      if (!questionCol || !answerCol) {
        throw new Error("没有识别到题目列或答案列。请使用“题目/题干”和“答案/正确答案”等表头。");
      }

      return rows.map((row, index) => {
        const rawQuestion = String(row[questionCol] || "").trim();
        const columnOptions = optionCols
          .map(({ letter, column }) => ({ letter, text: String(row[column] || "").trim() }))
          .filter(option => option.text);
        const inlineOptions = columnOptions.length ? [] : splitInlineOptions(rawQuestion);
        const options = columnOptions.length ? columnOptions : inlineOptions;
        const answerLetters = parseAnswer(row[answerCol], options);
        const type = detectType(typeCol ? row[typeCol] : "", answerLetters);

        return {
          id: index + 1,
          question: columnOptions.length ? rawQuestion : cleanQuestionText(rawQuestion),
          options,
          answerLetters,
          type,
          rawAnswer: String(row[answerCol] || "").trim()
        };
      }).filter(item => item.question && item.options.length >= 2 && item.answerLetters.length);
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let quote = false;

      for (let i = 0; i < text.length; i += 1) {
        const char = text[i];
        const next = text[i + 1];
        if (char === '"' && quote && next === '"') {
          cell += '"';
          i += 1;
        } else if (char === '"') {
          quote = !quote;
        } else if (char === "," && !quote) {
          row.push(cell);
          cell = "";
        } else if ((char === "\n" || char === "\r") && !quote) {
          if (char === "\r" && next === "\n") i += 1;
          row.push(cell);
          if (row.some(value => String(value).trim())) rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += char;
        }
      }
      row.push(cell);
      if (row.some(value => String(value).trim())) rows.push(row);

      const headers = rows.shift() || [];
      return rows.map(values => {
        const item = {};
        headers.forEach((header, index) => {
          item[String(header).trim()] = values[index] || "";
        });
        return item;
      });
    }

    async function readCsvText(file) {
      const buffer = await file.arrayBuffer();
      const utf8Text = new TextDecoder("utf-8", { fatal: false }).decode(buffer).replace(/^\uFEFF/, "");
      const utf8Rows = parseCsv(utf8Text);
      const utf8Headers = utf8Rows.length ? Object.keys(utf8Rows[0]) : [];
      const utf8QuestionCol = findColumn(utf8Headers, ["题目", "题干", "问题", "试题", "question", "title", "stem"]);
      const utf8AnswerCol = findColumn(utf8Headers, ["答案", "正确答案", "参考答案", "answer", "correct", "key"]);

      if (utf8QuestionCol && utf8AnswerCol) return utf8Text;

      try {
        const gbText = new TextDecoder("gb18030", { fatal: false }).decode(buffer).replace(/^\uFEFF/, "");
        const gbRows = parseCsv(gbText);
        const gbHeaders = gbRows.length ? Object.keys(gbRows[0]) : [];
        const gbQuestionCol = findColumn(gbHeaders, ["题目", "题干", "问题", "试题", "question", "title", "stem"]);
        const gbAnswerCol = findColumn(gbHeaders, ["答案", "正确答案", "参考答案", "answer", "correct", "key"]);
        if (gbQuestionCol && gbAnswerCol) return gbText;
      } catch (error) {
        console.warn("GB18030 CSV 解码失败", error);
      }

      return utf8Text;
    }

    async function parseWorkbook(file) {
      if (/\.csv$/i.test(file.name)) {
        const text = await readCsvText(file);
        return { rows: parseCsv(text), sheetName: "CSV" };
      }
      if (!window.XLSX) {
        throw new Error("Excel 解析库未加载。请联网后刷新页面，或把 SheetJS xlsx 库下载到本地后引入。");
      }
      const buffer = await file.arrayBuffer();
      const workbook = XLSX.read(buffer, { type: "array" });
      const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(firstSheet, { defval: "" });
      return { rows, sheetName: workbook.SheetNames[0] };
    }

    function resetProgress() {
      state.done = 0;
      state.right = 0;
      state.selected.clear();
      state.answered = false;
      els.nextBtn.textContent = "随机下一题";
      els.nextBtn.disabled = true;
      state.wrongIds = [];
      state.mode = "all";
      rebuildQueue("all");
    }

    function updateStats() {
      els.totalCount.textContent = state.questions.length;
      els.doneCount.textContent = state.done;
      els.rightCount.textContent = state.right;
      els.statusPill.textContent = state.questions.length
        ? (isRoundComplete() ? (state.mode === "wrong" ? "错题已完成" : "本轮已完成") : (state.mode === "wrong" ? "错题模式" : "已导入"))
        : "未导入";
      els.wrongModeBtn.disabled = !state.wrongIds.length;
      els.wrongModeBtn.textContent = state.mode === "wrong" ? "返回全部题" : `只刷错题(${state.wrongIds.length})`;
      els.restartBtn.disabled = !state.questions.length;
    }

    function shuffle(items) {
      const copy = [...items];
      for (let index = copy.length - 1; index > 0; index -= 1) {
        const swapIndex = Math.floor(Math.random() * (index + 1));
        [copy[index], copy[swapIndex]] = [copy[swapIndex], copy[index]];
      }
      return copy;
    }

    function rebuildQueue(mode = state.mode) {
      state.mode = mode;
      const source = mode === "wrong"
        ? state.questions.filter(question => state.wrongIds.includes(question.id))
        : state.questions;
      state.queue = shuffle(source.map(question => question.id));
      state.cursor = 0;
    }

    function getQuestionById(id) {
      return state.questions.find(question => question.id === id) || null;
    }

    function isRoundComplete() {
      return state.queue.length > 0 && state.cursor >= state.queue.length;
    }

    function showRoundComplete() {
      els.nextBtn.textContent = "本轮已完成";
      els.nextBtn.disabled = true;
      els.statusPill.textContent = state.mode === "wrong" ? "错题已完成" : "本轮已完成";
    }

    function quizSignature(questions) {
      const stable = questions.map(question => ({
        question: question.question,
        options: question.options.map(option => [option.letter, option.text]),
        answerLetters: question.answerLetters,
        type: question.type
      }));
      const text = JSON.stringify(stable);
      let hash = 0;
      for (let index = 0; index < text.length; index += 1) {
        hash = ((hash << 5) - hash + text.charCodeAt(index)) | 0;
      }
      return `${questions.length}:${Math.abs(hash)}`;
    }

    function pickRandomQuestion() {
      if (!state.questions.length) return;
      if (!state.queue.length) {
        rebuildQueue(state.mode);
      }
      if (state.cursor >= state.queue.length) {
        showRoundComplete();
        saveProgress();
        return;
      }
      if (!state.queue.length) return;
      state.current = getQuestionById(state.queue[state.cursor]);
      state.cursor += 1;
      state.selected.clear();
      state.answered = false;
      renderQuestion();
      saveProgress();
    }

    function renderQuestion() {
      const q = state.current;
      els.quizCard.classList.remove("hidden");
      els.questionText.textContent = q.question;
      els.typeTag.textContent = q.type === "multiple" ? "多选题" : "单选题";
      els.feedback.classList.remove("show");
      els.feedback.textContent = "";
      els.submitBtn.disabled = false;
      els.nextBtn.disabled = true;
      els.nextBtn.textContent = "随机下一题";
      els.options.innerHTML = "";

      q.options.forEach(option => {
        const button = document.createElement("button");
        button.className = "option";
        button.type = "button";
        button.dataset.letter = option.letter;
        button.innerHTML = `<span class="letter">${option.letter}</span><span>${escapeHtml(option.text)}</span>`;
        button.addEventListener("click", () => toggleOption(option.letter));
        els.options.appendChild(button);
      });
    }

    function toggleOption(letter) {
      if (state.answered) return;
      if (state.current.type === "single") {
        state.selected.clear();
        state.selected.add(letter);
      } else if (state.selected.has(letter)) {
        state.selected.delete(letter);
      } else {
        state.selected.add(letter);
      }
      refreshSelectionClasses();
    }

    function refreshSelectionClasses() {
      [...els.options.children].forEach(button => {
        button.classList.toggle("selected", state.selected.has(button.dataset.letter));
      });
    }

    function arraysEqual(a, b) {
      return a.length === b.length && a.every((value, index) => value === b[index]);
    }

    function submitAnswer() {
      if (!state.current || !state.selected.size || state.answered) return;
      const selected = [...state.selected].sort();
      const correct = [...state.current.answerLetters].sort();
      const isRight = arraysEqual(selected, correct);
      state.answered = true;
      state.done += 1;
      if (isRight) state.right += 1;
      if (isRight) {
        state.wrongIds = state.wrongIds.filter(id => id !== state.current.id);
      } else if (!state.wrongIds.includes(state.current.id)) {
        state.wrongIds.push(state.current.id);
      }

      [...els.options.children].forEach(button => {
        const letter = button.dataset.letter;
        if (correct.includes(letter)) button.classList.add("correct");
        if (selected.includes(letter) && !correct.includes(letter)) button.classList.add("wrong");
      });

      els.feedback.innerHTML = `${isRight ? "回答正确。" : "回答错误。"} 正确答案：<b>${correct.join("、")}</b>${state.current.rawAnswer && !/^[A-Z,，;；、\s]+$/i.test(state.current.rawAnswer) ? `（${escapeHtml(state.current.rawAnswer)}）` : ""}`;
      if (isRoundComplete()) {
        els.feedback.innerHTML += ` 本轮${state.mode === "wrong" ? "错题" : "题目"}已全部完成。`;
      }
      els.feedback.classList.add("show");
      els.submitBtn.disabled = true;
      if (isRoundComplete()) {
        showRoundComplete();
      } else {
        els.nextBtn.disabled = false;
      }
      updateStats();
      saveProgress();
    }

    async function loadQuestions(questions, name, options = {}) {
      const signature = quizSignature(questions);
      const saved = await readProgress();
      state.questions = questions;
      state.sheetName = name || "已载入题库";
      state.signature = signature;
      if (!options.skipLibrarySave) {
        await writeLibrary({ name: state.sheetName, questions, signature });
        await refreshSavedLibraries(signature);
      }

      const savedSignature = saved && (saved.signature || (Array.isArray(saved.questions) ? quizSignature(saved.questions) : ""));
      if (saved && savedSignature === signature) {
        applyProgressPayload(saved, questions, state.sheetName, signature);
        els.sheetName.textContent = `${state.sheetName}（已恢复进度）`;
        updateStats();
        renderQuestion();
        saveProgress();
        return;
      }

      resetProgress();
      els.sheetName.textContent = state.sheetName;
      updateStats();
      pickRandomQuestion();
      saveProgress();
    }

    function openProgressDb() {
      return new Promise((resolve, reject) => {
        if (!window.indexedDB) {
          reject(new Error("当前浏览器不支持 IndexedDB"));
          return;
        }
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = () => {
          const db = request.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            db.createObjectStore(STORE_NAME, { keyPath: "id" });
          }
          if (!db.objectStoreNames.contains(LIBRARY_STORE)) {
            db.createObjectStore(LIBRARY_STORE, { keyPath: "id" });
          }
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    async function writeLibrary({ name, questions, signature }) {
      try {
        const db = await openProgressDb();
        await new Promise((resolve, reject) => {
          const transaction = db.transaction(LIBRARY_STORE, "readwrite");
          transaction.objectStore(LIBRARY_STORE).put({
            id: signature,
            name,
            questions,
            signature,
            updatedAt: Date.now()
          });
          transaction.oncomplete = resolve;
          transaction.onerror = () => reject(transaction.error);
        });
        db.close();
      } catch (error) {
        console.warn("保存题库失败", error);
      }
    }

    async function readLibraries() {
      try {
        const db = await openProgressDb();
        const libraries = await new Promise((resolve, reject) => {
          const transaction = db.transaction(LIBRARY_STORE, "readonly");
          const request = transaction.objectStore(LIBRARY_STORE).getAll();
          request.onsuccess = () => resolve(request.result || []);
          request.onerror = () => reject(request.error);
        });
        db.close();
        return libraries.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
      } catch (error) {
        console.warn("读取题库列表失败", error);
        return [];
      }
    }

    async function readLibrary(id) {
      try {
        const db = await openProgressDb();
        const library = await new Promise((resolve, reject) => {
          const transaction = db.transaction(LIBRARY_STORE, "readonly");
          const request = transaction.objectStore(LIBRARY_STORE).get(id);
          request.onsuccess = () => resolve(request.result || null);
          request.onerror = () => reject(request.error);
        });
        db.close();
        return library;
      } catch (error) {
        console.warn("读取题库失败", error);
        return null;
      }
    }

    async function refreshSavedLibraries(selectedId = state.signature) {
      const libraries = await readLibraries();
      els.savedLibrarySelect.innerHTML = "";
      if (!libraries.length) {
        const option = document.createElement("option");
        option.value = "";
        option.textContent = "暂无已保存题库";
        els.savedLibrarySelect.appendChild(option);
        els.loadSavedBtn.disabled = true;
        return;
      }
      libraries.forEach(library => {
        const option = document.createElement("option");
        option.value = library.id;
        option.textContent = `${library.name || "未命名题库"}（${library.questions.length}题）`;
        els.savedLibrarySelect.appendChild(option);
      });
      if (selectedId && libraries.some(library => library.id === selectedId)) {
        els.savedLibrarySelect.value = selectedId;
      }
      els.loadSavedBtn.disabled = false;
    }

    async function loadSavedLibrary() {
      const id = els.savedLibrarySelect.value;
      if (!id) return;
      const library = await readLibrary(id);
      if (!library || !Array.isArray(library.questions) || !library.questions.length) {
        alert("没有读取到这个题库，请重新导入一次。");
        await refreshSavedLibraries();
        return;
      }
      await loadQuestions(library.questions, library.name, { skipLibrarySave: true });
    }

    async function writeProgress(payload) {
      try {
        const db = await openProgressDb();
        await new Promise((resolve, reject) => {
          const transaction = db.transaction(STORE_NAME, "readwrite");
          transaction.objectStore(STORE_NAME).put({ id: "current", payload });
          transaction.oncomplete = resolve;
          transaction.onerror = () => reject(transaction.error);
        });
        db.close();
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          savedAt: payload.savedAt,
          sheetName: payload.sheetName,
          total: payload.questions.length,
          signature: payload.signature
        }));
      } catch (error) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
      }
    }

    async function readProgress() {
      try {
        const db = await openProgressDb();
        const payload = await new Promise((resolve, reject) => {
          const transaction = db.transaction(STORE_NAME, "readonly");
          const request = transaction.objectStore(STORE_NAME).get("current");
          request.onsuccess = () => resolve(request.result ? request.result.payload : null);
          request.onerror = () => reject(request.error);
        });
        db.close();
        if (payload) return payload;
      } catch (error) {
        console.warn("读取 IndexedDB 进度失败", error);
      }

      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      const payload = JSON.parse(raw);
      return Array.isArray(payload.questions) ? payload : null;
    }

    function saveProgress() {
      if (!state.questions.length) return;
      const payload = {
        questions: state.questions,
        currentId: state.current ? state.current.id : null,
        done: state.done,
        right: state.right,
        sheetName: state.sheetName,
        signature: state.signature || quizSignature(state.questions),
        queue: state.queue,
        cursor: state.cursor,
        wrongIds: state.wrongIds,
        mode: state.mode,
        savedAt: Date.now()
      };
      writeProgress(payload).catch(error => console.warn("保存进度失败", error));
    }

    function applyProgressPayload(payload, questions = payload.questions, sheetName = payload.sheetName, signature = payload.signature) {
      state.questions = questions;
      state.done = Number(payload.done) || 0;
      state.right = Number(payload.right) || 0;
      state.sheetName = sheetName || "已恢复题库";
      state.signature = signature || quizSignature(questions);
      const validIds = new Set(state.questions.map(question => question.id));
      state.queue = Array.isArray(payload.queue) ? payload.queue.filter(id => validIds.has(id)) : [];
      state.cursor = Number(payload.cursor) || 0;
      state.wrongIds = Array.isArray(payload.wrongIds) ? payload.wrongIds.filter(id => validIds.has(id)) : [];
      state.mode = payload.mode === "wrong" ? "wrong" : "all";
      state.current = payload.currentId ? getQuestionById(payload.currentId) : null;
      if (!state.current) {
        if (!state.queue.length || state.cursor >= state.queue.length) rebuildQueue(state.mode);
        state.current = getQuestionById(state.queue[state.cursor]) || state.questions[0];
      }
      state.selected.clear();
      state.answered = false;
    }

    async function restoreProgress() {
      try {
        const payload = await readProgress();
        if (!payload) return false;
        if (!Array.isArray(payload.questions) || !payload.questions.length) return false;
        applyProgressPayload(payload);
        await writeLibrary({
          name: state.sheetName,
          questions: state.questions,
          signature: state.signature
        });
        await refreshSavedLibraries(state.signature);
        els.sheetName.textContent = state.sheetName;
        updateStats();
        renderQuestion();
        return true;
      } catch (error) {
        console.warn("恢复进度失败", error);
        return false;
      }
    }

    function restartPractice() {
      if (!state.questions.length) return;
      if (!confirm("确定重新开始吗？当前答题统计和错题记录会清空，但题库会保留。")) return;
      resetProgress();
      updateStats();
      pickRandomQuestion();
      saveProgress();
    }

    function toggleWrongMode() {
      if (!state.questions.length) return;
      const nextMode = state.mode === "wrong" ? "all" : "wrong";
      if (nextMode === "wrong" && !state.wrongIds.length) return;
      rebuildQueue(nextMode);
      updateStats();
      pickRandomQuestion();
      saveProgress();
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    els.fileInput.addEventListener("change", async event => {
      const file = event.target.files[0];
      if (!file) return;
      try {
        const { rows, sheetName } = await parseWorkbook(file);
        const questions = buildQuestions(rows);
        if (!questions.length) throw new Error("没有找到有效题目。请检查题目、选项和答案是否在同一个工作表。");
        loadQuestions(questions, `${file.name} / ${sheetName}`);
      } catch (error) {
        alert(error.message);
      }
    });

    els.loadSample.addEventListener("click", () => {
      const rows = [
        { "题目": "下列哪一项是 Python 的列表类型？", "A": "tuple", "B": "list", "C": "dict", "D": "set", "答案": "B", "题型": "单选" },
        { "题目": "以下哪些属于 Excel 常见文件格式？", "A": ".xlsx", "B": ".docx", "C": ".xls", "D": ".pptx", "答案": "AC", "题型": "多选" },
        { "题目": "浏览器端导入题库时，文件会上传到服务器吗？", "A": "会", "B": "不会，本工具在本地解析", "C": "必须注册账号", "D": "只能手机使用", "答案": "B", "题型": "单选" }
      ];
      loadQuestions(buildQuestions(rows), "示例题库");
    });

    els.submitBtn.addEventListener("click", submitAnswer);
    els.nextBtn.addEventListener("click", pickRandomQuestion);
    els.loadSavedBtn.addEventListener("click", loadSavedLibrary);
    els.restartBtn.addEventListener("click", restartPractice);
    els.wrongModeBtn.addEventListener("click", toggleWrongMode);
    refreshSavedLibraries();
    restoreProgress().then(restored => {
      if (!restored) updateStats();
    });
  </script>
</body>
</html>
